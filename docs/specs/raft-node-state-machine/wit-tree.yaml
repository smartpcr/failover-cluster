# WIT (Work Item Tree) for the "Raft Node State Machine" feature.
#
# Structure: phase -> stage -> step
# `expectedFileChanges` is the planning-time PR-size budget: the coding
# pipeline soft-fails the PR if the actual file count exceeds it.
#
# Server-enforced caps (Phase 16.3 / 16.5):
#   phase -> stage     : <= 20 children
#   stage -> step      : <= 20 children
#   step  -> file set  : <= 20 changed files
#
# Counts here:
#   1 phase, 3 stages, 11 steps. Max files-per-step = 2. Well within budget.
#
# Anchor note: `stage-raft-node-state-machine` is a NEW stage inserted
# before `stage-leader-election` in the existing
# `docs/stories/failover-cluster-XRAFT/workstreams.yaml`. It lives under
# the existing `phase-consensus-engine` parent (NOT
# `phase-raft-consensus-engine`, which is only the per-iteration branch
# prefix). The stage is the structural foundation that
# `stage-leader-election` and `stage-log-replication` later build on.

feature: "Raft Node State Machine"
slug: "raft-node-state-machine"
parent_story: "failover-cluster:XRAFT"
parent_phase_anchor: "phase-consensus-engine"
new_stage_anchor: "stage-raft-node-state-machine"
inserts_before: "stage-leader-election"

phases:
  - id: "phase-raft-node-state-machine"
    title: "Raft Node State Machine"
    description: >-
      Pure I/O-free consensus engine: structs, role transitions, and the
      step() input dispatcher with Tick handling. Foundation for the
      existing stage-leader-election and stage-log-replication
      workstreams under phase-consensus-engine.
    stages:
      # -------------------------------------------------------------------
      - id: "stage-engine-data-structures"
        title: "Engine Data Structures"
        description: >-
          ElectionTimer, PeerState, RaftNode struct + constructors +
          accessors, plus the NodeRole::PreCandidate / VoteGrantedSet
          surface in types.rs. Each step is one self-contained type
          with unit tests.
        steps:
          - id: "step-election-timer"
            title: "ElectionTimer with logical-tick randomised timeout"
            description: >-
              Implements from_config_ms / new / reset / tick /
              is_expired / remaining, ceiling-division for ms->ticks,
              the >=1-tick min clamp, the max>=min clamp, and the
              pick_in_range helper. Unit tests cover randomisation
              range, reset re-rolls the target, and edge cases
              (min==max, sub-tick interval).
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
          - id: "step-peer-state"
            title: "PeerState per-peer replication tracker"
            description: >-
              Fields use the architecture.md §3.2 spec names (no _tick
              suffix): last_fetch_offset: LogIndex,
              last_fetch_time: u64 (logical ticks),
              last_caught_up_time: u64, is_voter: bool. Provides
              PeerState::new(is_voter). Unit tests assert
              initialisation and Eq/Debug derives needed by Stage 3.2
              assertions.
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
          - id: "step-noderole-precandidate-and-vote-granted-set"
            title: "NodeRole::PreCandidate and VoteGrantedSet types"
            description: >-
              Adds the PreCandidate role and the VoteGrantedSet helper
              to types.rs; re-exports through lib.rs. Pre-Vote
              requires PreCandidate to be distinguishable from
              Candidate so the engine never bumps term during the
              speculative phase. VoteGrantedSet dedupes duplicate
              grants from the same voter (protects Stage 3.2 quorum
              correctness).
            files:
              - "xraft-core/src/types.rs"
              - "xraft-core/src/lib.rs"
            expectedFileChanges: 2
          - id: "step-raftnode-struct"
            title: "RaftNode struct, constructors, accessors, initial-state test"
            description: >-
              RaftNode { id, role, hard_state (term, voted_for),
              commit_index, last_applied, election_timer,
              votes_received, pre_votes_received, peers, voter_set,
              config, leader_id, last_leader_contact_tick,
              logical_tick, last_log_index, last_log_term, rng }.
              Constructors are RaftNode::new(config: ClusterConfig)
              -> Result<Self> (entropy-seeded) and
              RaftNode::new_with_seed(config: ClusterConfig, seed: u64)
              -> Result<Self> (deterministic, for tests / sim harness).
              Both validate config and build_voter_set, returning
              XRaftError::Config on misconfig. Accessors:
              current_term, voted_for, is_leader, set_last_log.
              Initial state: Follower at term 0, no vote, election
              timer armed, peers populated from voter_set minus self.
              Re-export RaftNode + PeerState + ElectionTimer through
              lib.rs.
            files:
              - "xraft-core/src/node.rs"
              - "xraft-core/src/lib.rs"
            expectedFileChanges: 2
      # -------------------------------------------------------------------
      - id: "stage-role-transitions"
        title: "Role Transition Methods"
        description: >-
          The four become_* methods. Each has distinct preconditions
          and side-effects (PersistHardState, AppendEntries,
          BecomeLeader, StepDown). One PR per transition keeps review
          surface small.
        steps:
          - id: "step-become-follower"
            title: "become_follower(term, leader_id)"
            description: >-
              Stale-term guard (Raft §5.1): term < current_term is a
              debug-asserted no-op (no role change, no leader recorded,
              no actions emitted, tracing::warn!). If term >
              current_term, clears voted_for and emits
              PersistHardState. Emits StepDown if previously Leader.
              Records leader contact when leader_id is Some. Tests
              cover higher-term step-down, stale-term ignore, and
              voted_for preservation when term is unchanged.
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
          - id: "step-become-pre-candidate"
            title: "become_pre_candidate()"
            description: >-
              MUST NOT mutate current_term or voted_for. Sets
              role=PreCandidate, installs a fresh pre_votes_received
              (VoteGrantedSet) pre-credited with the self pre-vote,
              resets the election timer with a fresh random target,
              returns Action::SendMessage(PreVoteRequest) fan-out to
              every voter peer. Tests assert term and voted_for are
              unchanged, self-pre-vote is the only initial entry, and
              one SendMessage per peer is emitted.
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
          - id: "step-become-candidate"
            title: "become_candidate()"
            description: >-
              Increments current_term by exactly one, sets
              voted_for = Some(self.id), installs a fresh
              votes_received pre-credited with the self vote, resets
              election timer, emits PersistHardState (term/vote must
              be durable before any RPC) followed by
              Action::SendMessage(VoteRequest) fan-out. Tests assert
              the term bump magnitude, self-vote presence, and the
              PersistHardState-before-SendMessage action ordering.
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
          - id: "step-become-leader"
            title: "become_leader() with peer init and no-op entry"
            description: >-
              Initialises peers map (one PeerState per voter except
              self): last_fetch_offset = LogIndex(0),
              last_fetch_time = self.logical_tick,
              last_caught_up_time = self.logical_tick. Emits
              Action::BecomeLeader followed by
              Action::AppendEntries(vec![Entry { term: current_term,
              payload: EntryPayload::NoOp, .. }]). Tests assert the
              no-op entry uses current_term, peers are fully
              initialised, and the action ordering is
              BecomeLeader -> AppendEntries.
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
      # -------------------------------------------------------------------
      - id: "stage-input-dispatcher-and-tick"
        title: "Input Dispatcher and Tick Handler"
        description: >-
          Public surface (step()) and the only input handled by 3.1
          (Input::Tick). The unsupported-input fence lives here
          because it is the contract boundary with 3.2/3.3.
        steps:
          - id: "step-input-action-enum-surface"
            title: "Extend Input/Action enums for Stage 3.1 surface"
            description: >-
              message.rs: declare Input::Tick plus the four
              Stage-3.2-deferred variants (VoteRequest, VoteResponse,
              PreVoteRequest, PreVoteResponse) and the four
              Stage-3.3-deferred variants (ClientPropose,
              FetchRequest, FetchResponse, FetchRequestAcked). Action
              surface adds PersistHardState, AppendEntries,
              SendMessage { target, message: OutboundMessage },
              BecomeLeader, StepDown, RejectUnsupportedInput {
              input_kind: &'static str, reason: String }. Re-export
              Input, Action, OutboundMessage through lib.rs.
            files:
              - "xraft-core/src/message.rs"
              - "xraft-core/src/lib.rs"
            expectedFileChanges: 2
          - id: "step-step-dispatch-and-tick"
            title: "step() dispatcher and Input::Tick handling"
            description: >-
              Match on Input, dispatch to per-variant private helpers,
              accumulate Vec<Action> via a local buffer. The match
              enumerates every Input variant explicitly (no wildcard)
              so the exhaustiveness checker forces any future variant
              to be classified as a handler or a rejection. Tick:
              increment self.logical_tick and election_timer.tick().
              On expiry, branch by role:
              Follower -> become_pre_candidate();
              PreCandidate -> become_pre_candidate() (RESTART the
              Pre-Vote round; MUST NOT become_candidate() here
              because the term bump requires a Stage 3.2 pre-vote
              quorum - architecture.md §5.1 Pre-Vote safety);
              Candidate -> become_pre_candidate() (fallback through
              Pre-Vote, same disruption-risk argument);
              Leader / Observer -> no-op. Adds a #[tracing::instrument]
              span per step(). Tests cover Follower->PreCandidate, the
              PreCandidate-timeout pre-vote-restart (term unchanged),
              the Candidate-timeout fallback to PreCandidate, and the
              Leader / Observer no-op.
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
          - id: "step-reject-unsupported-inputs"
            title: "RejectUnsupportedInput fence for deferred handlers"
            description: >-
              EIGHT inputs are rejected at Stage 3.1 landing time,
              grouped by the stage that will later install a real
              handler. Four Stage-3.2-deferred: VoteRequest,
              VoteResponse, PreVoteRequest, PreVoteResponse (reason
              names "Stage 3.2 (Leader Election)"). Four
              Stage-3.3-deferred: ClientPropose, FetchRequest,
              FetchResponse, FetchRequestAcked (reason names "Stage 3.3
              (Log Replication)"). Each rejection emits exactly one
              Action::RejectUnsupportedInput with a stable
              input_kind: &'static str discriminant and the reason
              string; the arm bodies do not touch self (encodes the
              no-mutation invariant). Tests assert one-and-only-one
              rejection per input and that
              role/term/vote/commit/last-applied/log-tip/election-timer
              all stay unchanged.
            files:
              - "xraft-core/src/node.rs"
            expectedFileChanges: 1
