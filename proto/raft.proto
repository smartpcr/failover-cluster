syntax = "proto3";

package xraft;

// ---------------------------------------------------------------------------
// Election RPCs
// ---------------------------------------------------------------------------

// Real election vote request (term already incremented).
// Universal identity/fencing fields: cluster_id, leader_epoch (architecture §2.3).
message VoteRequest {
  string cluster_id     = 1;
  uint64 leader_epoch   = 2;
  uint64 candidate_id   = 3;
  uint64 term           = 4;
  uint64 last_log_index = 5;
  uint64 last_log_term  = 6;
}

message VoteResponse {
  string cluster_id   = 1;
  uint64 leader_epoch  = 2;
  uint64 term          = 3;
  bool   vote_granted  = 4;
  optional uint64 leader_hint = 5;
}

// Pre-vote request — sent before incrementing term to check quorum reachability.
message PreVoteRequest {
  string cluster_id     = 1;
  uint64 leader_epoch   = 2;
  uint64 candidate_id   = 3;
  uint64 term           = 4;
  uint64 last_log_index = 5;
  uint64 last_log_term  = 6;
}

message PreVoteResponse {
  string cluster_id   = 1;
  uint64 leader_epoch  = 2;
  uint64 term          = 3;
  bool   vote_granted  = 4;
  optional uint64 leader_hint = 5;
}

// ---------------------------------------------------------------------------
// Pull-based log replication (KRaft-style Fetch)
// ---------------------------------------------------------------------------

message FetchRequest {
  string cluster_id       = 1;
  uint64 leader_epoch     = 2;
  uint64 replica_id       = 3;
  uint64 fetch_offset     = 4;
  uint64 last_fetched_epoch = 5;
}

// Returned when the follower's log has diverged from the leader's.
message DivergingEpoch {
  uint64 epoch      = 1;
  uint64 end_offset = 2;
}

message FetchResponse {
  string cluster_id        = 1;
  uint64 leader_epoch      = 2;
  uint64 leader_id         = 3;
  uint64 high_watermark    = 4;
  repeated LogEntry entries = 5;
  optional DivergingEpoch diverging_epoch = 6;
}

// ---------------------------------------------------------------------------
// Log entries
// ---------------------------------------------------------------------------

enum EntryType {
  COMMAND  = 0;
  NO_OP    = 1;
  CONFIG   = 2;
}

message LogEntry {
  uint64    index      = 1;
  uint64    term       = 2;
  EntryType entry_type = 3;
  bytes     data       = 4;
}

// ---------------------------------------------------------------------------
// Snapshot transfer
// ---------------------------------------------------------------------------

message Endpoint {
  string host = 1;
  uint32 port = 2;
}

message VoterRecord {
  uint64 node_id           = 1;
  string directory_id      = 2;
  repeated Endpoint endpoints = 3;
}

message VoterSet {
  repeated VoterRecord voters = 1;
}

message SnapshotMetadata {
  uint64   last_included_index = 1;
  uint64   last_included_term  = 2;
  VoterSet voter_set           = 3;
  string   snapshot_id         = 4;
}

message FetchSnapshotRequest {
  string cluster_id   = 1;
  uint64 leader_epoch = 2;
  uint64 replica_id   = 3;
  string snapshot_id  = 4;
}

message FetchSnapshotChunk {
  string cluster_id            = 1;
  uint64 leader_epoch          = 2;
  uint32 chunk_index           = 3;
  bytes  data                  = 4;
  bool   done                  = 5;
  optional SnapshotMetadata metadata = 6;
}
