syntax = "proto3";

package xraft;

// ---------------------------------------------------------------------------
// Election RPCs
// ---------------------------------------------------------------------------

// Real election vote request (term already incremented).
// Universal identity/fencing fields: cluster_id, leader_epoch (architecture §2.3).
message VoteRequest {
  string cluster_id     = 1;
  uint64 leader_epoch   = 2;
  uint64 candidate_id   = 3;
  uint64 term           = 4;
  uint64 last_log_index = 5;
  uint64 last_log_term  = 6;
}

message VoteResponse {
  string cluster_id   = 1;
  uint64 leader_epoch  = 2;
  uint64 term          = 3;
  bool   vote_granted  = 4;
  optional uint64 leader_hint = 5;
}

// Pre-vote request — sent before incrementing term to check quorum reachability.
message PreVoteRequest {
  string cluster_id     = 1;
  uint64 leader_epoch   = 2;
  uint64 candidate_id   = 3;
  uint64 term           = 4;
  uint64 last_log_index = 5;
  uint64 last_log_term  = 6;
}

message PreVoteResponse {
  string cluster_id   = 1;
  uint64 leader_epoch  = 2;
  uint64 term          = 3;
  bool   vote_granted  = 4;
  optional uint64 leader_hint = 5;
}

// ---------------------------------------------------------------------------
// Pull-based log replication (KRaft-style Fetch)
// ---------------------------------------------------------------------------

message FetchRequest {
  string cluster_id       = 1;
  uint64 leader_epoch     = 2;
  uint64 replica_id       = 3;
  uint64 fetch_offset     = 4;
  uint64 last_fetched_epoch = 5;
}

// Returned when the follower's log has diverged from the leader's.
message DivergingEpoch {
  uint64 epoch      = 1;
  uint64 end_offset = 2;
}

message FetchResponse {
  string cluster_id        = 1;
  uint64 leader_epoch      = 2;
  uint64 leader_id         = 3;
  uint64 high_watermark    = 4;
  repeated LogEntry entries = 5;
  optional DivergingEpoch diverging_epoch = 6;
}

// ---------------------------------------------------------------------------
// Log entries
// ---------------------------------------------------------------------------

// proto3 best practice: zero must be an explicit "unspecified" sentinel so a
// missing/default-encoded enum field never silently decodes as a valid type.
// Conversion code in xraft-core/src/message.rs rejects ENTRY_TYPE_UNSPECIFIED.
enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_COMMAND     = 1;
  ENTRY_TYPE_NO_OP       = 2;
  ENTRY_TYPE_CONFIG      = 3;
}

message LogEntry {
  uint64    index      = 1;
  uint64    term       = 2;
  EntryType entry_type = 3;
  bytes     data       = 4;
}

// ---------------------------------------------------------------------------
// Snapshot transfer
// ---------------------------------------------------------------------------

message Endpoint {
  string host = 1;
  uint32 port = 2;
}

message VoterRecord {
  uint64 node_id           = 1;
  string directory_id      = 2;
  repeated Endpoint endpoints = 3;
}

message VoterSet {
  repeated VoterRecord voters = 1;
}

message SnapshotMetadata {
  uint64   last_included_index = 1;
  uint64   last_included_term  = 2;
  // Required: every snapshot must carry the voter set in effect at
  // last_included_index. The Rust wire conversion in xraft-core/src/message.rs
  // rejects messages where voter_set is missing or contains zero voters.
  VoterSet voter_set           = 3;
  string   snapshot_id         = 4;
}

message FetchSnapshotRequest {
  string cluster_id   = 1;
  uint64 leader_epoch = 2;
  uint64 replica_id   = 3;
  string snapshot_id  = 4;
}

message FetchSnapshotChunk {
  string cluster_id            = 1;
  uint64 leader_epoch          = 2;
  uint32 chunk_index           = 3;
  bytes  data                  = 4;
  bool   done                  = 5;
  optional SnapshotMetadata metadata = 6;
}

// NOTE: The Raft gRPC service definition is intentionally omitted from this
// stage. Stage 1.3 ("RPC Message Definitions") owns wire *messages* only.
// The transport layer (introduced in a later stage) will own the gRPC service
// contract and its tonic-build configuration, at which point a `service
// RaftService { ... }` definition will live in the transport crate's proto
// (or be added back here once the transport crate enables client/server
// generation). Declaring a service here while xraft-core/build.rs disables
// both `build_server` and `build_client` would produce dead wire surface.
